<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint Shop Daily Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --border: #252b38;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.12);
    --warn: #ff6b35;
    --text: #e4e8f0;
    --muted: #7a8499;
    --rnp: #4da6ff;
    --rvp: #00d4aa;
    --rnb: #a78bfa;
    --rva: #fbbf24;
    --sidebar-w: 220px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky; top: 0; z-index: 200;
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-badge {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 10px;
    color: #0d0f14; letter-spacing: 0.03em;
  }

  .logo-text { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 20px; }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: 'IBM Plex Mono', monospace;
    color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #clock { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }

  /* hamburger for mobile */
  .burger {
    display: none; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 20px; padding: 4px 8px;
  }

  /* ── BODY LAYOUT (sidebar + content) ── */
  .app-body {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
    flex-shrink: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section-label {
    padding: 18px 16px 6px;
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: all 0.13s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .sidebar-item.active {
    color: var(--accent);
    background: var(--accent-dim);
    border-left-color: var(--accent);
  }

  .sidebar-item .item-icon {
    width: 20px; height: 20px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0;
    background: rgba(255,255,255,0.04);
  }
  .sidebar-item.active .item-icon {
    background: var(--accent-dim);
  }

  .sidebar-badge {
    margin-left: auto;
    font-size: 10px; font-weight: 600;
    background: rgba(255,255,255,0.07);
    border-radius: 10px; padding: 1px 7px;
    color: var(--muted);
    min-width: 20px; text-align: center;
  }
  .sidebar-item.active .sidebar-badge {
    background: var(--accent-dim); color: var(--accent);
  }

  .sidebar-divider {
    margin: 8px 16px;
    height: 1px;
    background: var(--border);
  }

  /* ── CONTENT AREA ── */
  .content {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
  }

  main { padding: 28px 32px; max-width: 1100px; }

  .section-label {
    font-size: 10px; font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }

  /* ── DATE BAR ── */
  .date-bar {
    display: flex; flex-direction: column; gap: 14px;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .date-bar h1 { font-size: 22px; font-weight: 300; letter-spacing: -0.01em; }
  .date-bar h1 span { color: var(--accent); font-weight: 600; }
  .date-bar h1 .station-name-badge {
    font-size: 13px; font-weight: 600; font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); margin-left: 6px;
  }

  .shift-tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 4px;
    width: fit-content;
  }
  .shift-tab {
    padding: 5px 14px; border-radius: 5px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; cursor: pointer;
    border: none; background: none; color: var(--muted);
    transition: all 0.15s;
  }
  .shift-tab.active {
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(0,212,170,0.25);
  }

  /* ── KPI CARDS ── */
  .kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
    position: relative; overflow: hidden; transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: rgba(0,212,170,0.3); }
  .kpi-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: var(--card-accent, var(--accent));
  }
  .kpi-label { font-size: 10px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .kpi-value { font-size: 30px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; color: var(--text); line-height: 1; margin-bottom: 6px; }
  .kpi-sub { font-size: 11px; color: var(--muted); }

  /* ── TABLE ── */
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
  .table-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 13px; font-weight: 600; letter-spacing: 0.03em; }
  .entry-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(0,212,170,0.2); border-radius: 20px; padding: 2px 10px; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; min-width: 600px; border-collapse: collapse; }
  thead th { padding: 9px 16px; text-align: left; font-size: 10px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid rgba(37,43,56,0.6); transition: background 0.1s; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 16px; font-size: 13px; }
  .td-skid { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
  .td-body { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
  .td-time { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }

  .model-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.05em; }
  .model-RVP { background: rgba(0,212,170,0.12); color: var(--rvp); border: 1px solid rgba(0,212,170,0.25); }
  .model-RNP { background: rgba(77,166,255,0.12); color: var(--rnp); border: 1px solid rgba(77,166,255,0.25); }
  .model-RNB { background: rgba(167,139,250,0.12); color: var(--rnb); border: 1px solid rgba(167,139,250,0.25); }
  .model-RVA { background: rgba(251,191,36,0.12); color: var(--rva); border: 1px solid rgba(251,191,36,0.25); }
  .model-default { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

  /* ── MODEL SUMMARY ── */
  .model-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
  .model-header { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .model-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
  .model-item { background: var(--surface); padding: 14px 16px; transition: background 0.1s; }
  .model-item:hover { background: rgba(255,255,255,0.03); }
  .model-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .model-name { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; }
  .model-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .model-total { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; color: var(--text); }
  .model-bar-track { height: 3px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .model-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

  /* ── FORM ── */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
  .form-inner { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-full { grid-column: 1 / -1; }
  label { display: block; font-size: 10px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.08); }
  select option { background: var(--surface); }
  textarea { resize: vertical; min-height: 60px; }
  .btn-submit { grid-column: 1 / -1; background: var(--accent); color: #0d0f14; border: none; border-radius: 6px; padding: 11px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── COLOR CHIPS ── */
  .color-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .color-chip { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s; }
  .color-chip:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .color-chip.selected { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.07); color: var(--text); box-shadow: 0 0 0 2px rgba(255,255,255,0.15); }
  .color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .td-color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  .btn-delete { background: none; border: 1px solid transparent; border-radius: 5px; color: var(--muted); font-size: 13px; padding: 3px 8px; cursor: pointer; transition: all 0.15s; line-height: 1; }
  .btn-delete:hover { background: rgba(255,107,53,0.12); border-color: rgba(255,107,53,0.4); color: var(--warn); }

  /* ── DATE NAV ── */
  .date-nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 14px; padding: 5px 10px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
  .date-nav-btn:hover { color: var(--accent); border-color: var(--accent); }
  .today-btn { background: var(--accent-dim); border: 1px solid rgba(0,212,170,0.25); border-radius: 6px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 6px 12px; cursor: pointer; transition: opacity 0.15s; }
  .today-btn:hover { opacity: 0.8; }

  /* ── STATION PANELS ── */
  .station-panel { display: none; }
  .station-panel.active { display: block; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 12px 20px; font-size: 13px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 300; }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── OVERLAY (mobile) ── */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 149; }

  /* ── FOOTER ── */
  footer { text-align: center; padding: 16px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.04em; }

  /* ── TABLET ── */
  @media (max-width: 900px) {
    :root { --sidebar-w: 200px; }
    main { padding: 20px 16px; }
    .kpi-row { grid-template-columns: repeat(2,1fr); gap: 12px; }
    .model-list { grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); }
  }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    .burger { display: block; }

    .sidebar {
      position: fixed;
      top: 56px; left: 0;
      height: calc(100vh - 56px);
      z-index: 150;
      transform: translateX(-100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }

    .content { width: 100%; }
    main { padding: 14px 12px 32px; }
    .kpi-row { grid-template-columns: repeat(2,1fr); gap: 8px; }
    .kpi-value { font-size: 24px; }
    .form-inner { grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; }
    input, select, textarea { font-size: 15px; }
    .model-list { grid-template-columns: repeat(3,1fr); }
    .toast { bottom: 12px; right: 12px; left: 12px; text-align: center; }
    footer { font-size: 9px; padding: 10px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="burger" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
    <div class="logo">
      <div class="logo-badge">PS</div>
      <div>
        <div class="logo-text">Paint Shop</div>
        <div class="logo-sub">Daily Production Report</div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <div id="clock">—</div>
  </div>
</header>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app-body">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Stations</div>
    <!-- All station items injected by JS -->
    <div id="sidebar-paint-items"></div>
  </nav>

  <!-- CONTENT -->
  <div class="content">
    <main>
      <!-- SHARED DATE + SHIFT BAR -->
      <div class="date-bar">
        <div style="display:flex;flex-direction:column;gap:8px;width:100%">
          <h1>
            Report — <span id="date-display">—</span>
            <span class="station-name-badge" id="station-name-badge">BIW</span>
          </h1>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <button class="date-nav-btn" onclick="stepDate(-1)">&#8592;</button>
            <input type="date" id="date-picker" onchange="onDatePick(this.value)"
              style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);outline:none;cursor:pointer;flex:1;min-width:120px">
            <button class="date-nav-btn" onclick="stepDate(1)">&#8594;</button>
            <button class="today-btn" onclick="goToday()">Today</button>
          </div>
        </div>
        <div class="shift-tabs" id="shift-tabs">
          <button class="shift-tab active" onclick="setShift(this,'All')">All</button>
          <button class="shift-tab" onclick="setShift(this,'Morning')">Morning</button>
          <button class="shift-tab" onclick="setShift(this,'Evening')">Evening</button>
          <button class="shift-tab" onclick="setShift(this,'Night')">Night</button>
        </div>
      </div>

      <!-- PANELS injected by JS -->
      <div id="panels-container"></div>
    </main>
    <footer>Paint Shop · Body-In-White Daily Report System &nbsp;·&nbsp; Shared live data · <span id="footer-station">BIW</span></footer>
  </div>
</div>

<div class="toast" id="toast"></div>

  '970':'#1642de', '992':'#83a0ae', '859':'#7c6a21'
};

// ── STATE ──
let currentDate = todayKey();
let currentShift = 'All';
let currentStation = 'BIW';

// ── HELPERS ──
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtKey(k) {
  const d = new Date(k + 'T00:00:00');
  const label = d.toLocaleDateString('en-MY', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  return k === todayKey() ? label + ' (Today)' : label;
}
function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function storeKey(sid, dk) { return `ps_${sid}_${dk}`; }

// In-memory cache so render functions can stay mostly synchronous.
const entryCache = {};

function loadEntries(sid, dk) {
  return entryCache[storeKey(sid, dk)] || [];
}

// Map a Supabase row to the entry shape the UI expects (keeps `id` for delete).
function rowToEntry(row) {
  return {
    id: row.id,
    skid: row.skid,
    body: row.body,
    time: row.time,
    model: row.model,
    color: row.color,
    remark: row.remark
  };
}

async function fetchEntries(sid, dk) {
  const key = storeKey(sid, dk);
  if (!sb) {
    showToast('Supabase not configured ✕', true);
    entryCache[key] = [];
    return entryCache[key];
  }
  try {
    const { data, error } = await sb
      .from(TABLE)
      .select('*')
      .eq('station_id', sid)
      .eq('entry_date', dk)
      .order('time', { ascending: true });
    if (error) throw error;
    entryCache[key] = (data || []).map(rowToEntry);
  } catch (e) {
    console.error('fetchEntries failed:', e && e.message ? e.message : e);
    showToast(`Failed to load entries: ${e && e.message ? e.message : 'unknown error'} ✕`, true);
    entryCache[key] = entryCache[key] || [];
  }
  return entryCache[key];
}

// Insert a single new entry row into Supabase.
async function insertEntry(sid, dk, entry) {
  if (!sb) { showToast('Supabase not configured ✕', true); return null; }
  try {
    const { data, error } = await sb
      .from(TABLE)
      .insert([{
        station_id: sid,
        entry_date: dk,
        skid: entry.skid,
        body: entry.body,
        time: entry.time,
        model: entry.model,
        color: entry.color,
        remark: entry.remark
      }])
      .select();
    if (error) throw error;
    return data && data[0] ? rowToEntry(data[0]) : null;
  } catch (e) {
    console.error('insertEntry failed:', e && e.message ? e.message : e);
    showToast(`Save failed: ${e && e.message ? e.message : 'unknown error'} ✕`, true);
    return null;
  }
}

// Delete a single entry row by its Supabase row id.
async function deleteEntryById(id) {
  if (!sb) { showToast('Supabase not configured ✕', true); return false; }
  try {
    const { error } = await sb.from(TABLE).delete().eq('id', id);
    if (error) throw error;
    return true;
  } catch (e) {
    console.error('deleteEntryById failed:', e && e.message ? e.message : e);
    showToast(`Delete failed: ${e && e.message ? e.message : 'unknown error'} ✕`, true);
    return false;
  }
}

// ── CLEAR DEMO ──
async function clearDemo() {
  if (!sb) return;
  const dk = todayKey();
  const demoSkids = [8597, 2345, 2466, 4567, 4699];
  try {
    await sb.from(TABLE).delete().eq('entry_date', dk).in('skid', demoSkids);
  } catch (e) {
    console.error('clearDemo failed:', e);
  }
}

// ── REALTIME ──
// Live-updates the current view whenever any client inserts/deletes a row.
function subscribeRealtime() {
  if (!sb) return;
  sb
    .channel('paint_entries_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => {
      renderStation(currentStation);
    })
    .subscribe();
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-MY', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

function buildPanels() {
  document.getElementById('panels-container').innerHTML =
    ALL_STATIONS.map(s => panelHTML(s)).join('');
  ALL_STATIONS.forEach(s => buildColorChips(s.id));
}

function buildColorChips(sid) {
  const grid = document.getElementById(`${sid}-color-grid`);
  if (!grid) return;
  const none = document.createElement('button');
  none.type='button'; none.className='color-chip'; none.dataset.val='';
  none.onclick = function(){ selectColor(sid, this); };
  none.innerHTML = `<span style="font-size:11px;color:var(--muted)">None</span>`;
  grid.appendChild(none);
  COLOR_CODES.forEach(code => {
    const hex = COLOR_HEX[code] || '#888';
    const btn = document.createElement('button');
    btn.type='button'; btn.className='color-chip'; btn.dataset.val=code;
    btn.onclick = function(){ selectColor(sid, this); };
    btn.innerHTML = `<span class="color-dot" style="background:${hex}"></span>${code}`;
    grid.appendChild(btn);
  });
}

// ── UPDATE SIDEBAR BADGES ──
async function updateBadges() {
  for (const s of ALL_STATIONS) {
    const all = await fetchEntries(s.id, currentDate);
    const entries = all.filter(shiftFilter);
    const el = document.getElementById(`badge-${s.id}`);
    if (el) el.textContent = entries.length;
  }
}

// ── SWITCH STATION ──
async function switchStation(sid, btnEl) {
  currentStation = sid;
  document.querySelectorAll('.station-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(`panel-${sid}`);
  if (panel) panel.classList.add('active');
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  else {
    const nb = document.getElementById(`nav-${sid}`);
    if (nb) nb.classList.add('active');
  }
  const s = ALL_STATIONS.find(x => x.id === sid);
  document.getElementById('station-name-badge').textContent = s ? s.label : sid;
  document.getElementById('footer-station').textContent = s ? s.label : sid;
  await renderStation(sid);
  closeSidebar();
}

// ── SHIFT FILTER ──
function shiftFilter(e) {
  const [h, m] = e.time.split(':').map(Number);
  const mins = h * 60 + m;
  if (currentShift === 'Morning') return mins >= 360 && mins < 840;
  if (currentShift === 'Evening') return mins >= 840 && mins < 1320;
  if (currentShift === 'Night') return mins >= 1320 || mins < 360;
  return true;
}

function modelTagClass(m) {
  return ['RVP','RNP','RNB','RVA'].includes(m) ? `model-${m}` : 'model-default';
}

// ── RENDER STATION ──
async function renderStation(sid) {
  const entries = await fetchEntries(sid, currentDate);
  const filtered = entries.filter(shiftFilter);
  const tbody = document.getElementById(`${sid}-tbody`);
  if (!tbody) return;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${NO_SKID_STATIONS.includes(sid) ? 7 : 8}" style="text-align:center;padding:28px;color:var(--muted);font-size:13px;">No entries for this ${currentShift==='All'?'date':'shift'}</td></tr>`;
  } else {
    tbody.innerHTML = filtered.map((e, i) => {
      const chex = e.color && COLOR_HEX[e.color] ? COLOR_HEX[e.color] : null;
      const colorCell = e.color
        ? `<span class="td-color-dot" style="background:${chex||'#888'}"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:12px">${e.color}</span>`
        : `<span style="color:var(--muted);font-size:12px">—</span>`;
      const noSkid = NO_SKID_STATIONS.includes(sid);
      return `<tr>
        <td style="color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;width:32px">${i+1}</td>
        ${!noSkid ? `<td class="td-skid">${e.skid}</td>` : ''}
        <td class="td-body">${e.body}</td>
        <td class="td-time">${e.time}</td>
        <td><span class="model-tag ${modelTagClass(e.model)}">${e.model}</span></td>
        <td style="display:flex;align-items:center;gap:0">${colorCell}</td>
        <td style="color:var(--muted);font-size:12px">${e.remark||'—'}</td>
        <td><button class="btn-delete" onclick="deleteEntry('${sid}',${e.id},'${e.skid}','${e.body}')" title="Delete">&#x2715;</button></td>
      </tr>`;
    }).join('');
  }

  const counts = {};
  ALL_MODELS.forEach(m => counts[m] = 0);
  filtered.forEach(e => { if (counts[e.model] !== undefined) counts[e.model]++; });

  const total = filtered.length;
  const mmo = (counts.RNB||0)+(counts.RNP||0)+(counts.RVP||0)+(counts.RVA||0);
  const mb  = (counts.A||0)+(counts.E||0)+(counts.C||0)+(counts.GLA||0)+(counts.GLC||0);

  document.getElementById(`${sid}-kpi-total`).textContent = total;
  document.getElementById(`${sid}-kpi-mmo`).textContent = mmo;
  document.getElementById(`${sid}-kpi-mb`).textContent = mb;
  document.getElementById(`${sid}-entry-count`).textContent = `${total} entr${total===1?'y':'ies'}`;
  document.getElementById(`${sid}-kpi-last`).textContent = filtered.length ? filtered[filtered.length-1].body : '—';

  const maxVal = Math.max(...ALL_MODELS.map(m => counts[m]), 1);
  document.getElementById(`${sid}-model-list`).innerHTML = ALL_MODELS.map(m => {
    const c = counts[m] || 0;
    const color = MODEL_COLORS[m] || '#7a8499';
    const pct = Math.round((c / maxVal) * 100);
    return `<div class="model-item">
      <div class="model-row">
        <span class="model-name"><span class="model-dot" style="background:${color}"></span>${m}</span>
        <span class="model-total" style="color:${c>0?color:'var(--muted)'}">${c}</span>
      </div>
      <div class="model-bar-track"><div class="model-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');

  await updateBadges();
}

// ── COLOR SELECT ──
function selectColor(sid, btn) {
  document.querySelectorAll(`#${sid}-color-grid .color-chip`).forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById(`${sid}-color`).value = btn.dataset.val;
}

// ── ADD ENTRY ──
async function addEntry(sid) {
  if (currentDate !== todayKey()) return;
  const noSkid = NO_SKID_STATIONS.includes(sid);
  const skid   = noSkid ? null : document.getElementById(`${sid}-skid`).value.trim();
  const body   = document.getElementById(`${sid}-body`).value.trim();
  const model  = document.getElementById(`${sid}-model`).value;
  const time   = document.getElementById(`${sid}-time`).value || new Date().toTimeString().slice(0,5);
  const color  = document.getElementById(`${sid}-color`).value;
  const remark = document.getElementById(`${sid}-remark`).value.trim();

  if ((!noSkid && !skid) || !body || !model) { showToast(`Fill in ${noSkid ? '' : 'Skid, '}Body, and Model ✕`, true); return; }

  const entries = await fetchEntries(sid, currentDate);
  if (!noSkid && entries.find(e => e.skid === parseInt(skid))) { showToast(`Skid ${skid} already exists ✕`, true); return; }
  if (entries.find(e => e.body === body))            { showToast(`Body ${body} already exists ✕`, true); return; }

  const saved = await insertEntry(sid, currentDate, { skid: noSkid ? null : parseInt(skid), body, time, model, color, remark });
  if (!saved) return;
  await renderStation(sid);

  if (!noSkid) document.getElementById(`${sid}-skid`).value = '';
  document.getElementById(`${sid}-body`).value = '';
  document.getElementById(`${sid}-model`).value = '';
  document.getElementById(`${sid}-color`).value = '';
  document.getElementById(`${sid}-remark`).value = '';
  document.querySelectorAll(`#${sid}-color-grid .color-chip`).forEach(c => c.classList.remove('selected'));
  setDefaultTime(sid);
  showToast('Entry added ✓');
}

// ── DELETE ENTRY ──
async function deleteEntry(sid, id, skid, body) {
  if (!confirm(`Delete entry?\nSkid: ${skid}  |  Body: ${body}`)) return;
  const ok = await deleteEntryById(id);
  if (!ok) return;
  await renderStation(sid);
  showToast('Entry deleted');
}

// ── DATE ──
async function applyDate(dk) {
  currentDate = dk;
  document.getElementById('date-picker').value = dk;
  document.getElementById('date-display').textContent = fmtKey(dk);
  const isToday = dk === todayKey();
  ALL_STATIONS.forEach(s => {
    const fc = document.getElementById(`form-card-${s.id}`);
    if (!fc) return;
    fc.querySelectorAll('input, select, textarea').forEach(el => el.disabled = !isToday);
    document.getElementById(`${s.id}-submit`).disabled = !isToday;
    fc.style.opacity = isToday ? '1' : '0.45';
    fc.title = isToday ? '' : 'Cannot add entries to past dates';
    if (isToday) setDefaultTime(s.id);
  });
  await renderStation(currentStation);
  await updateBadges();
}

function onDatePick(val) { if (val) applyDate(val); }
function stepDate(dir) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + dir);
  const next = dateToKey(d);
  if (next <= todayKey()) applyDate(next);
}
function goToday() { applyDate(todayKey()); }

// ── SHIFT ──
async function setShift(btn, shift) {
  currentShift = shift;
  document.querySelectorAll('.shift-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  await renderStation(currentStation);
  await updateBadges();
}

// ── DEFAULT TIME ──
function setDefaultTime(sid) {
  const now = new Date();
  const el = document.getElementById(`${sid}-time`);
  if (el) el.value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

// ── TOAST ──
function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = error ? 'var(--warn)' : 'var(--accent)';
  t.style.color = error ? 'var(--warn)' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
(async function init() {
  await clearDemo();
  buildSidebarItems();
  buildPanels();
  await applyDate(todayKey());
  await switchStation('BIW', document.getElementById('nav-BIW'));

  // Real-time updates when any user adds/deletes an entry
  subscribeRealtime();

  // Fallback poll in case realtime is briefly unavailable
  setInterval(async () => {
    await renderStation(currentStation);
  }, 15000);
})();
</script>
